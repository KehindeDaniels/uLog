{% extends "partials/clocking_base.html" %} {% block content %}

<div class="card">
  <h2>Staff Clock-In</h2>
  <div class="card-sub">Enter your staff ID to continue</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <input name="staff_id" placeholder="E.g. UBA001" />
    <button>Continue</button>
  </form>
</div>

{% endblock %}
